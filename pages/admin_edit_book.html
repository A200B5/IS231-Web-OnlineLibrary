<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../css/style.css">
    <title>Edit Book Details - Online Library</title>
</head>
<body>
    <header>
        <h1>Online Library</h1>
    
    <nav>
    <a href="../index.html">Home</a> |
    <a href="../pages/admin_add_book.html">Add Book</a> |
    <a href="../pages/admin_books.html">View Books</a> |
    <a href="../index.html">Logout</a>
    </nav>
    </header>
    <hr>
    <main>
        <h2>Edit Book Details</h2>
        <form method="post" id="EditBookDetails" name="BookDetails" enctype="multipart/form-data" autocomplete="off">

            <label for="title">Title</label>
            <input type="text" id="title" name="title" required autofocus><br><br>

            <label for="author">Author</label>
            <input type="text" id="author" name="author" required><br><br>

            <label for="year">Year of Publish</label>
            <input type="number" id="year" name="year" required><br><br>

            <label for="description">Description</label>
            <textarea id="description" name="description"></textarea><br><br>

            <label for="category">Category</label>
            <select id="category" name="category" required>
                <option>Biography</option>
                <option value="Programming">Programming</option>
                <option value="History">History</option>
                <option value="Science & Technology">Science & Technology</option>
                <option value="Self-Help">Self-Help</option>
                <option value="Business">Business</option>
                <option value="Philosophy">Philosophy</option>
                <option value="Religion">Religion</option>
                <option value="Politics">Politics</option>
                <option value="Art">Art</option>
                <option value="Travel">Travel</option>
                <option value="Cooking">Cooking</option>
                <option value="Education">Education</option>
                <option value="Health">Health</option>
                <option value="Literary">Literary Fiction</option>
                <option value="Mystery">Mystery</option>
                <option value="Fantasy">Fantasy</option>
                <option value="Romance">Romance</option>
                <option value="Historical Fiction">Historical Fiction</option>
                <option value="Horror">Horror</option>
                <option value="Young Adult">Young Adult</option>
                <option value="Children's Books">Children's Books</option>
                <option value="Graphic Novels">Graphic Novels</option>
            </select><br><br>

            <label for="image">Cover URL</label>
            <input type="url" id="image" name="image" required><br><br>
            <label for="copies">Available Copies</label>
            <input type="number" id="copies" name="copies" required min="1"><br><br>
            <input class="btn" type="submit" value="Save Changes"><br>
        </form>
    </main>
    <hr>
    <footer>
            <form action="https://formsubmit.co/be136af79a36ee1f98093677271e4c0c" method="POST">
                <div>
                    <h2>Get in Touch</h2>
                </div>
                <div class="form-row">
                    <input class="contact" type="text" name="name" placeholder="Your Name" required>
                    <input class="contact" type="email" name="email" placeholder="Your Email" required>
                </div>
                <textarea class="contact" name="massege" placeholder="Your Massege"></textarea><br><br>
                <button class="btn" type="submit">Submit</button>
                <button class="btn" type="reset">Reset</button>
            </form>

        <p>Copyright @ 2026 All Rights</p>
    </footer>
    <script src="../js/navigation.js"></script>
</body>
</html>
