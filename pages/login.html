<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>

</head>

<body class="login-page">
<header>

    <h1>Login</h1>

    <nav>
    <a href="../index.html">Home</a> |
    <a href="../pages/login.html">Login</a> |
    <a href="../pages/signup.html">Sign Up</a>
    </nav>

</header>
<main>
    <hr>
    <form id="loginForm">

        <label for="username_email">Email or Username</label>    
        <div class="username-email-box"> 
            <input type="text" id="username_email" required>
            <button type="button">
                <i class="fa-solid fa-user"></i>
            </button>
        </div>
        <br>

        <div class="password-header">
            <label for="password">Password</label>
            <a class="forget-password">Forgot Password?</a>
        </div>
        <div class="password-box">
            <input type="password" id="password" placeholder="********" required>
            <button type="button" class="toggle-password">
                <i class="fa-regular fa-eye-slash"></i>
            </button>
        </div>
        <br>
        
        <input class="btn btn-success" type="submit" value="Login">
        <br>
        <p>Don't have an account? <a class="login-link" href="signup.html">Sign Up</a></p>

    </form>

</main>

<footer>
<p>IS231 - Phase 1</p>
</footer>

<script src="../js/auth.js"></script>
</body>
</html>
