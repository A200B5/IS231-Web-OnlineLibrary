<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <title>sign up</title>

</head>

<body>
    <header>

    <h1>Sign Up</h1>
    
    <nav>
    <a href="../index.html">Home</a> |
    <a href="../pages/login.html">Login</a> |
    <a href="../pages/signup.html">Sign Up</a>
    </nav>

</header>
<main>
    <hr>
    <form action="login.html">

        <label for="txt">Username:</label>
        <br>
        <input type="text" name="username" id="txt" placeholder="username" required>
        <br><br>

        <label for="em">Email:</label>
        <br>
        <input type="email" name="email" id="em" placeholder="email" required>
        <br><br>

        <label for="pass">Password:</label>
        <br>
        <input type="password" name="password" id="pass" placeholder="password" required>
        <br><br>

        <label for="conpass">Confirm Password:</label>
        <br>
        <input type="password" name="confirm_password" id="conpass" placeholder="confirm password" required>
        <br><br>

        <label>User Type:</label>
        <br>
        <input type="radio" name="role" value="admin" required> Admin
        <input type="radio" name="role" value="user"> User
        <br>
<input type="submit" value="Sign Up">

</form>

</main>
<footer>
    <form action="https://formsubmit.co/be136af79a36ee1f98093677271e4c0c" method="POST">
        <div>
            <h2>Get in Touch</h2>
        </div>
        <div class="form-row">
            <input class="contact" type="text" name="name" placeholder="Your Name" required>
            <input class="contact" type="email" name="email" placeholder="Your Email" required>
        </div>
        <textarea class="contact" name="massege" placeholder="Your Massege"></textarea><br><br>
        <button class="btn" type="submit">Submit</button>
        <button class="btn" type="reset">Reset</button>
    </form>

    <p>Copyright @ 2026 All Rights</p>
</footer>

</body>

</html>
