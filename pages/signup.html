<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>sign up</title>

</head>

<body>
    <header>

    <h1>Sign Up</h1>
    
    <nav>
    <a href="../index.html">Home</a> |
    <a href="../pages/login.html">Login</a> |
    <a href="../pages/signup.html">Sign Up</a>
    </nav>

</header>
<main>
    <hr>
    <form action="login.html">

        <label for="txt">Username</label>
        <div class="username-box">
            <input type="text" name="username" id="txt" placeholder="username" required>
            <button>
                <i class="fa-solid fa-user"></i>
            </button>
        </div>

        <label for="em">Email</label>
        <input type="email" name="email" id="em" placeholder="example@gmail.com" required>
        <br><br>

        <label for="pass">Password</label>
        <div class="password-box">
            <input type="password" name="password" id="pass" placeholder="*******" required>
            <button class="btn1">
                <i class="fa-solid fa-eye"></i>
            </button>
        </div>

        <label for="conpass">Confirm Password</label>
        <input type="password" name="confirm_password" id="conpass" placeholder="confirm password" required>
        <br><br>

        <label>User Type</label>
        <input type="radio" name="role" value="admin" required> Admin
        <input type="radio" name="role" value="user"> User
        <br>

        <input class="btn" type="submit" value="Sign Up">

    </form>

</main>

<footer>
<p>IS231 - Phase 1</p>
</footer>

</body>
</html>
