<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <title>Search Books</title>
</head>

<body>
    <header>
<h1>Search Books</h1>


<nav>
    <a href="../index.html">Home</a> |
    <a href="../pages/search.html">Search</a> |
    <a href="../pages/borrowed_books.html">My Books</a> |
    <a href="../index.html">Logout</a>
</nav>
</header>

<main>
<hr>

<form class="search-form">

<div class="search-inputs">
<label for="author_name">Author Name:</label>
<input type="text" id="author_name" name="author_name">


<label for="book_title">Book Title:</label>
<input type="text" id="book_title" name="book_title">
</div>

<div class="search-filters">
<label for="category">Category:</label>
<select id="category" name="category">
<option>Any</option>
<option>Programming</option>
<option>Finance</option>
<option>Fiction</option>
<option>Business</option>
<option>Self Development</option>
<option>Productivity</option>
</select>


<label for="availability">Availability:</label>
<select name="availability" id="availability">
<option>Any</option>
<option>Available</option>
<option>Borrowed</option>
</select>
</div>

<button type="submit" class="btn btn-success">Search</button>

</form>
<br>
<h2>Search Results:</h2>

<div class="results" id="resultsContainer"></div>

</main>

<footer>
    <form action="https://formsubmit.co/be136af79a36ee1f98093677271e4c0c" method="POST">
        <div>
            <h2>Get in Touch</h2>
        </div>
        <div class="form-row">
            <input class="contact" type="text" name="name" placeholder="Your Name" required>
            <input class="contact" type="email" name="email" placeholder="Your Email" required>
        </div>
        <textarea class="contact" name="massege" placeholder="Your Massege"></textarea><br><br>
        <button class="btn" type="submit">Submit</button>
        <button class="btn" type="reset">Reset</button>
    </form>

    <p>Copyright @ 2026 All Rights</p>
</footer>
<script src="../js/store.js"></script>
<script>requireLogin();</script>
<script src="../js/books.js"></script>
<script src="../js/search.js"></script>
</body>

</html>
