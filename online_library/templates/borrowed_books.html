{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <title>borrowed Books</title>
</head>

<body>

    <header>
        <h1>Borrowed books</h1>


        <nav>
            <a href="{% url 'home' %}">Home</a> |
            <a href="{% url 'search' %}">Search</a> |
            <a href="{% url 'borrowed_books' %}">My Books</a> |
            <a href="{% url 'home' %}">Logout</a>
        </nav>
    </header>

    <main>
        <h2>My Books</h2>
        <div class="borrowed-header"><a href="{% url 'user_books' %}" class="btn browse-btn">Browse Books</a></div>
        <div class="borrowed-books" id="borrowedContainer"></div>

        </div>
    </main>

    <footer>
        <form action="https://formsubmit.co/be136af79a36ee1f98093677271e4c0c" method="POST">
            <div>
                <h2>Get in Touch</h2>
            </div>
            <div class="form-row">
                <input class="contact" type="text" name="name" placeholder="Your Name" required>
                <input class="contact" type="email" name="email" placeholder="Your Email" required>
            </div>
            <textarea class="contact" name="massege" placeholder="Your Massege"></textarea><br><br>
            <button class="btn" type="submit">Submit</button>
            <button class="btn" type="reset">Reset</button>
        </form>

        <p>Copyright @ 2026 All Rights</p>
    </footer>
    <script src="../js/store.js"></script>
<script>requireLogin();</script>
<script src="../js/books.js"></script>
<script src="../js/borrow.js"></script>
</body>

</html>
