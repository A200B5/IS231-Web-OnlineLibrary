{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <title>Browse Books - Online Library</title>
</head>

<body>
    <header>
        <h1>Online Library</h1>

        <nav>
            <a href="{% url 'home' %}">Home</a> |
            <a href="{% url 'search' %}">Search</a> |
            <a href="{% url 'borrowed_books' %}">My Books</a> |
            <a href="{% url 'logout' %}">Logout</a>
        </nav>

    </header>

    <main>

        <h2>Available Books</h2>

        <div class="books-container" id="booksContainer">
            <!-- JS will insert cards -->
        </div>

    </main>

    <footer>
        <form action="https://formsubmit.co/be136af79a36ee1f98093677271e4c0c" method="POST">
            <div>
                <h2>Get in Touch</h2>
            </div>
            <div class="form-row">
                <input class="contact" type="text" name="name" placeholder="Your Name" required>
                <input class="contact" type="email" name="email" placeholder="Your Email" required>
            </div>
            <textarea class="contact" name="massege" placeholder="Your Massege"></textarea><br><br>
            <button class="btn" type="submit">Submit</button>
            <button class="btn" type="reset">Reset</button>
        </form>

        <p>Copyright @ 2026 All Rights</p>
    </footer>


</body>

</html>
